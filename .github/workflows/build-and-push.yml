name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - stage
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional suffix appended to the timestamp tag (e.g. hotfix)"
        required: false
        default: ""
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: container-builder
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image tags
        id: meta
        env:
          TAG_SUFFIX: ${{ github.event.inputs.tag_suffix }}
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          VERSION="${TIMESTAMP}"
          if [ -n "$TAG_SUFFIX" ]; then
            VERSION="${VERSION}-${TAG_SUFFIX}"
          fi
          IMAGE_LOWER=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "image_tag=${IMAGE_LOWER}:${VERSION}" >> $GITHUB_OUTPUT
          echo "latest_tag=${IMAGE_LOWER}:latest" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.latest_tag }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max
